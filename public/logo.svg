<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 110" width="360" height="110" role="img" aria-label="Peak Medical Wholesale">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9a35a"/>
      <stop offset="1" stop-color="#9c7a35"/>
    </linearGradient>
  </defs>
  <!-- birds -->
  <path d="M232 20 q5 -5 10 0 q5 -5 10 0" fill="none" stroke="#1f3a5c" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M255 27 q4 -4 8 0 q4 -4 8 0" fill="none" stroke="#1f3a5c" stroke-width="1.8" stroke-linecap="round"/>
  <!-- mountains -->
  <g fill="#1f3a5c">
    <path d="M120 60 L150 18 L168 42 L182 26 L210 60 Z"/>
    <path d="M150 18 L156 26 L150 33 L144 26 Z" fill="#ffffff" opacity="0.85"/>
