  <!-- rules + WHOLESALE -->
  <line x1="92" y1="99" x2="138" y2="99" stroke="#1f3a5c" stroke-width="1.2"/>
  <line x1="222" y1="99" x2="268" y2="99" stroke="#1f3a5c" stroke-width="1.2"/>
  <text x="180" y="104" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="500"
